<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header><h1>Meu Pedido</h1></header>
    <main class="container">
        <div id="lista-itens"></div>
        <div class="pagamento">
            <h3>Forma de Pagamento</h3>
            <select id="metodo">
                <option value="pix">Pix</option>
                <option value="cartao">Cartão na Entrega</option>
            </select>
        </div>
        <button class="btn-finalizar" onclick="enviarPedido()">Confirmar Pedido</button>
        <a href="/" style="display:block; text-align:center; margin-top:20px;">Voltar</a>
    </main>

    <script>
        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        const lista = document.getElementById('lista-itens');
        let total = 0;

        carrinho.forEach(item => {
            lista.innerHTML += `<div class='card-carrinho'>${item.nome} - R$ ${item.preco.toFixed(2)}</div>`;
            total += item.preco;
        });

        function enviarPedido() {
            const metodo = document.getElementById('metodo').value;
            alert(`Pedido de R$ ${total.toFixed(2)} confirmado via ${metodo}!`);
            localStorage.clear();
            window.location.href = "/";
        }
    </script>
</body>
</html>
