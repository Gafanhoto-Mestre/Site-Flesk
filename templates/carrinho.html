<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header><h1>Meu Pedido</h1></header>
    <main class="container">
        <div id="lista-itens"></div>
        <form action="/final" method="post">
            <div class="pagamento">
                
                <p>
                    <!-- input:text-->
                    <label for="inome">Nome: </label>
                    <input type="text" name="nome" id="inome" required maxlength="15" placeholder="Digite seu nome" autocomplete="name">
                </p>
                <p>
                    <!-- input:number -->
                    <label for="imedia">Média: </label>
                    <input type="number" name="media" id="imedia" value="5" max="10" step="0.1">
                </p>
                <p>
                    <!-- input:date  / calendário normal -->
                    <!-- input:month / calendário de mês -->
                    <label for="ical">Calendário</label>
                    <input type="date" name="cal" id="ical" value="2026-04-11">
                </p>
                <p>
                    <!-- input:time / Hor -->
                    <label for="ihora">Horário</label>
                    <input type="time" name="hora" id="ihora">
                </p>
                <p>
                    <label for="icpf">CPF</label>
                    <input 
                    type="text" 
                    name="cpf" 
                    id="icpf" 
                    placeholder="000.000.000-00"
                    inputmode="numeric" 
                    maxlength="14"
                    pattern="\d{3}\.?\d{3}\.?\d{3}-?\d{2}"
                    title="Digite o CPF no formato 000.000.000-00"
                    required
                    >
                </p>
                <p>
                    <!-- input:submit / Enviar -->
                    <!-- input:reset / Limpar -->
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpar">
                </p>
          
                <label for="ipagamento"><h3>Forma de Pagamento</h3></label>
                <select name="metodo_pagamento" id="ipagamento">
                    <option value="Pix">Pix</option>
                    <option value="Cartão/Débito">Cartão/Débito</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão/Crédito">Cartão/Crédito</option>
                </select>
            </div>
            <input type="submit" class="btn-finalizar" value="Confirmar Pedido">
        </form>

        <a href="/" style="display:block; text-align:center; margin-top:20px;">Voltar</a>
    </main>

    <script>
        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        const lista = document.getElementById('lista-itens');
        let total = 0;

        carrinho.forEach(item => {
            lista.innerHTML += `<div class='card-carrinho'>${item.nome} - R$ ${item.preco.toFixed(2)}</div>`;
            total += item.preco;
        });

        function enviarPedido() {
            const metodo = document.getElementById('metodo').value;
            alert(`Pedido de R$ ${total.toFixed(2)} confirmado via ${metodo}!`);
            localStorage.clear();
            window.location.href = "/";
        }
    </script>
</body>
</html>
