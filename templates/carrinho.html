<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header><h1>Meu Pedido</h1></header>
    <main class="container">
        <div id="lista-itens"></div>
        <form action="/final" method="post">
            <div class="pagamento">
                <label for="ipagamento"><h3>Forma de Pagamento</h3></label>
                <select name="metodo_pagamento" id="ipagamento">
                    <option value="Pix">Pix</option>
                    <option value="Cartão/Débito">Cartão/Débito</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão/Crédito">Cartão/Crédito</option>
                </select>
            </div>
            <input type="submit" class="btn-finalizar" value="Confirmar Pedido">
        </form>

        <a href="/" style="display:block; text-align:center; margin-top:20px;">Voltar</a>
    </main>

    <script>
        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        const lista = document.getElementById('lista-itens');
        let total = 0;

        carrinho.forEach(item => {
            lista.innerHTML += `<div class='card-carrinho'>${item.nome} - R$ ${item.preco.toFixed(2)}</div>`;
            total += item.preco;
        });

        function enviarPedido() {
            const metodo = document.getElementById('metodo').value;
            alert(`Pedido de R$ ${total.toFixed(2)} confirmado via ${metodo}!`);
            localStorage.clear();
            window.location.href = "/";
        }
    </script>
</body>
</html>
